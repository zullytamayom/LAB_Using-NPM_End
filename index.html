<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NASA APOD Explorer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">

</head>
<body>

<div class="container py-5">
    <h1 class="text-center mb-5 fw-bold"><i class="bi bi-rocket-takeoff"></i> NASA APOD Explorer</h1>

    <div class="row g-4">
        <div class="col-lg-8">
            <div class="card p-4 shadow-lg">
                <div class="d-flex flex-wrap gap-3 mb-4 justify-content-between">
                    <input type="date" id="date-picker" class="form-control w-auto bg-dark text-white border-secondary">
                    <button id="btn-save" class="btn btn-warning fw-bold">
                        <i class="bi bi-star"></i> Guardar en Favoritos
                    </button>
                </div>

                <div id="apod-content">
                    <div class="text-center py-5" id="loader">
                        <div class="spinner-border text-info" role="status"></div>
                    </div>
                    
                    <div id="media-container"></div>
                    
                    <h2 id="apod-title" class="mt-4 "></h2>
                    <p id="apod-date" class="badge bg-secondary"></p>
                    <p id="apod-explanation" class="mt-3 lead fs-6 text-justify"></p>
                </div>
            </div>
        </div>

        <div class="col-lg-4">
            <div class="card p-4 h-100">
                <h3 class="h5 border-bottom pb-2 mb-3"><i class="bi bi-bookmark-star"></i> Mis Favoritos</h3>
                <div id="favorites-list" class="list-group list-group-flush">
                    </div>
            </div>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
